apiVersion: v2
appVersion: 2.10.1
name: tempo
description: Helm chart for Grafana Tempo in microservice mode
dependencies:
  - name: tempo-distributed
    version: 2.4.2
    repository: https://grafana-community.github.io/helm-charts
    condition: tempo.enabled
    alias: tempo
  - name: tempo-vulture
    version: 0.12.6
    repository: https://grafana-community.github.io/helm-charts
    condition: vulture.enabled
    alias: vulture
home: https://github.com/giantswarm/tempo-app
icon: https://s.giantswarm.io/app-icons/grafana-tempo/1/light.svg
maintainers:
  - name: giantswarm/team-atlas
    email: team-atlas@giantswarm.io
sources:
  - https://github.com/giantswarm/tempo-app
  - https://github.com/grafana-community/helm-charts/blob/main/charts/tempo-distributed
type: application
version: 0.13.0
annotations:
  io.giantswarm.application.team: atlas
